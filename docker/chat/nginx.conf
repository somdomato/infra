# Nginx Docker – espelha VPS2 (Oracle Linux 9)
#
# Porta 80  → KiwiIRC (chat.somdomato.com em produção)
# Porta 8080 → Gamja  (gamja.somdomato.com em produção)

server {
    listen 80;
    server_name localhost chat.localhost;

    # KiwiIRC static files
    location / {
        root /usr/share/kiwiirc;
        try_files $uri $uri/ /index.html;
    }

    # WebSocket para Ergo via kiwiirc transport (porta 8067)
    location /webirc {
        proxy_pass http://ergo:8067;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /webirc/kiwiirc {
        proxy_pass http://ergo:8067/webirc/kiwiirc;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ~ /\.ht { deny all; }
}

server {
    listen 8080;
    server_name localhost gamja.localhost;

    # Gamja static files (gerado no build)
    location / {
        root /usr/share/gamja/dist;
        try_files $uri $uri/ /index.html;
    }

    # WebSocket direto para Ergo (porta 8097 – gamja bypassa webircgateway)
    location /webirc {
        proxy_pass http://ergo:8097;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ~ /\.ht { deny all; }
}
