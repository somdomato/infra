# SDM – Orquestração completa (VPS1 + VPS2)
#
# VPS1 (Debian 13 amd64): site + stream   → perfil vps1
# VPS2 (Oracle Linux 9 arm64): chat        → perfil vps2
#
# Uso rápido (via Makefile):
#   make vps1   → site (Next.js + Nginx) + stream (Icecast + Liquidsoap)
#   make vps2   → chat (Ergo + KiwiIRC + Gamja)
#   make all    → tudo
#   make down   → derruba tudo
#
# Ou diretamente:
#   docker compose --profile vps1 up -d
#   docker compose --profile vps2 up -d
#
# Portas VPS1:  443/8080 (site), 8000 (icecast), 8010 (harbor)
# Portas VPS2:  9080 (KiwiIRC), 9081 (Gamja), 6667 (IRC)
#
# Todos os paths são relativos a esta pasta (infra/).
# Os repos ficam em ../somdomato, ../stream, ../chat

# ─────────────────────────────────────────────
# VPS1 – Site (somdomato)
# ─────────────────────────────────────────────
services:
  nextjs:
    profiles: [vps1]
    container_name: sdm-nextjs
    build:
      context: ../somdomato
      dockerfile: ../infra/docker/somdomato/Dockerfile.nextjs
    env_file:
      - ../somdomato/.env
    volumes:
      - type: bind
        source: ../somdomato
        target: /app
      - sdm-node-modules:/app/node_modules
      - sdm-nextjs-cache:/app/.next
      - type: bind
        source: ${MUSIC_PATH:-/home/lucas/music/sdm}
        target: /var/music/sdm
    environment:
      - NODE_ENV=development
      - HOSTNAME=0.0.0.0
      - MUSIC_PATH=/var/music/sdm
      - UPLOADS_DIR=/var/music/sdm/uploads
    networks:
      - vps1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/songs/last?genre=geral"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx-vps1:
    profiles: [vps1]
    container_name: sdm-nginx-vps1
    image: nginx:alpine
    ports:
      - "443:443"
      - "8080:80"
    volumes:
      - type: bind
        source: docker/somdomato/nginx.dev.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      - type: bind
        source: docker/somdomato/certs
        target: /etc/nginx/certs
        read_only: true
    depends_on:
      nextjs:
        condition: service_healthy
      icecast:
        condition: service_started
    networks:
      - vps1
    restart: unless-stopped

# ─────────────────────────────────────────────
# VPS1 – Stream (stream repo)
# ─────────────────────────────────────────────
  icecast:
    profiles: [vps1]
    container_name: sdm-icecast
    image: moul/icecast
    ports:
      - "8000:8000"
    environment:
      - ICECAST_SOURCE_PASSWORD=hackme
      - ICECAST_ADMIN_PASSWORD=hackmeagain
      - ICECAST_PASSWORD=hackme
      - ICECAST_RELAY_PASSWORD=hackme
      - ICECAST_HOSTNAME=localhost
    volumes:
      - type: bind
        source: docker/stream/icecast.docker.xml
        target: /etc/icecast2/icecast.xml
        read_only: true
    networks:
      - vps1
    restart: unless-stopped

  liquidsoap:
    profiles: [vps1]
    container_name: sdm-liquidsoap
    build:
      context: ../stream
      dockerfile: ../infra/docker/stream/Dockerfile.liquidsoap
    ports:
      - "8010:8010"
    volumes:
      - type: bind
        source: docker/stream/somdomato.docker.liq
        target: /etc/liquidsoap/sdm/somdomato.liq
        read_only: true
      - type: bind
        source: ${MUSIC_PATH:-/home/lucas/music/sdm}
        target: /var/music/sdm
        read_only: true
    depends_on:
      icecast:
        condition: service_started
      nextjs:
        condition: service_healthy
    networks:
      - vps1
    restart: unless-stopped

# ─────────────────────────────────────────────
# VPS2 – Chat
# ─────────────────────────────────────────────
  ergo:
    profiles: [vps2]
    container_name: sdm-ergo
    build:
      context: ../chat
      dockerfile: ../infra/docker/chat/Dockerfile.ergo
    ports:
      - "6667:6667"
    volumes:
      - ergo-data:/var/lib/ergo
      - type: bind
        source: docker/chat/ircd.docker.yaml
        target: /etc/ergo/ircd.yaml
        read_only: true
    networks:
      - vps2
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo QUIT | nc -q1 localhost 6667 | grep -q 'irc.localhost'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  webircgateway:
    profiles: [vps2]
    container_name: sdm-webircgateway
    build:
      context: ../chat
      dockerfile: ../infra/docker/chat/Dockerfile.webircgateway
    volumes:
      - type: bind
        source: docker/chat/webircgateway.docker.conf
        target: /opt/webircgateway/config.conf
        read_only: true
    depends_on:
      ergo:
        condition: service_healthy
    networks:
      - vps2
    restart: unless-stopped

  nginx-vps2:
    profiles: [vps2]
    container_name: sdm-nginx-vps2
    build:
      context: ../chat
      dockerfile: ../infra/docker/chat/Dockerfile.nginx
    ports:
      - "9080:80"
      - "9081:8080"
    volumes:
      - type: bind
        source: docker/chat/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      - type: bind
        source: docker/chat/kiwiirc.client.json
        target: /usr/share/kiwiirc/static/config.json
        read_only: true
      - type: bind
        source: docker/chat/gamja.config.json
        target: /usr/share/gamja/dist/config.json
        read_only: true
    depends_on:
      ergo:
        condition: service_healthy
    networks:
      - vps2
    restart: unless-stopped

volumes:
  sdm-node-modules:
  sdm-nextjs-cache:
  ergo-data:
    name: sdm-ergo-data

networks:
  vps1:
    name: sdm-vps1
    driver: bridge
  vps2:
    name: sdm-vps2
    driver: bridge
